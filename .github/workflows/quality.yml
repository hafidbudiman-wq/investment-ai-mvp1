name: Quality Gate

on:
  pull_request:
  push:
    branches: [main, mvp-1.2b-canonical-database]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/investai?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate Prisma schema
        run: npx prisma validate
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build application
        run: npm run build
